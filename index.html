<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片作品集展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 50%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
            position: relative;
        }

        /* 粒子Canvas */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 照片墙容器 */
        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 照片卡片 */
        .photo-card {
            position: relative;
            overflow: hidden;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeInUp 0.8s ease-out;
            animation-fill-mode: both;
        }

        /* 延迟动画 */
        .photo-card:nth-child(1) { animation-delay: 0.05s; }
        .photo-card:nth-child(2) { animation-delay: 0.1s; }
        .photo-card:nth-child(3) { animation-delay: 0.15s; }
        .photo-card:nth-child(4) { animation-delay: 0.2s; }
        .photo-card:nth-child(5) { animation-delay: 0.25s; }
        .photo-card:nth-child(6) { animation-delay: 0.3s; }
        .photo-card:nth-child(7) { animation-delay: 0.35s; }
        .photo-card:nth-child(8) { animation-delay: 0.4s; }
        .photo-card:nth-child(9) { animation-delay: 0.45s; }
        .photo-card:nth-child(10) { animation-delay: 0.5s; }
        .photo-card:nth-child(11) { animation-delay: 0.55s; }
        .photo-card:nth-child(12) { animation-delay: 0.6s; }
        .photo-card:nth-child(13) { animation-delay: 0.65s; }
        .photo-card:nth-child(14) { animation-delay: 0.7s; }
        .photo-card:nth-child(15) { animation-delay: 0.75s; }
        .photo-card:nth-child(16) { animation-delay: 0.8s; }
        .photo-card:nth-child(17) { animation-delay: 0.85s; }
        .photo-card:nth-child(18) { animation-delay: 0.9s; }
        .photo-card:nth-child(19) { animation-delay: 0.95s; }
        .photo-card:nth-child(20) { animation-delay: 1s; }
        .photo-card:nth-child(21) { animation-delay: 1.05s; }
        .photo-card:nth-child(22) { animation-delay: 1.1s; }
        .photo-card:nth-child(23) { animation-delay: 1.15s; }
        .photo-card:nth-child(24) { animation-delay: 1.2s; }
        .photo-card:nth-child(25) { animation-delay: 1.25s; }
        .photo-card:nth-child(26) { animation-delay: 1.3s; }
        .photo-card:nth-child(27) { animation-delay: 1.35s; }
        .photo-card:nth-child(28) { animation-delay: 1.4s; }
        .photo-card:nth-child(29) { animation-delay: 1.45s; }
        .photo-card:nth-child(30) { animation-delay: 1.5s; }
        .photo-card:nth-child(31) { animation-delay: 1.55s; }
        .photo-card:nth-child(32) { animation-delay: 1.6s; }
        .photo-card:nth-child(33) { animation-delay: 1.65s; }
        .photo-card:nth-child(34) { animation-delay: 1.7s; }
        .photo-card:nth-child(35) { animation-delay: 1.75s; }
        .photo-card:nth-child(36) { animation-delay: 1.8s; }
        .photo-card:nth-child(37) { animation-delay: 1.85s; }
        .photo-card:nth-child(38) { animation-delay: 1.9s; }
        .photo-card:nth-child(39) { animation-delay: 1.95s; }
        .photo-card:nth-child(40) { animation-delay: 2s; }

        /* 鼠标悬停效果 */
        .photo-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* 照片图片 */
        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.5s ease;
            display: block;
        }

        .photo-card:hover img {
            transform: scale(1.1);
        }

        /* 照片卡片覆盖层 */
        .photo-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(102,126,234,0.9), rgba(118,75,162,0.9));
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .photo-card:hover .photo-card-overlay {
            opacity: 1;
        }

        .photo-card-overlay-text {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }

        .photo-card:hover .photo-card-overlay-text {
            transform: translateY(0);
        }

        /* 灯光效果 */
        .photo-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        .photo-card:hover::before {
            animation: shine 0.6s ease-out;
        }

        /* 动画定义 */



        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shine {
            0% {
                opacity: 0;
                transform: rotate(45deg) translate(-50%, -50%);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: rotate(45deg) translate(50%, 50%);
            }
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            animation: modalFadeIn 0.3s ease;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            animation: modalZoomIn 0.3s ease;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: #667eea;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes modalZoomIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* 响应式设计 */
        @media (max-width: 1400px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 22px;
                max-width: 1200px;
            }
        }

        @media (max-width: 1024px) {
            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 20px;
                padding: 15px;
            }

            .photo-card img {
                height: 220px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
                padding: 10px;
            }

            .photo-card img {
                height: 200px;
            }

            .floating-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
                bottom: 20px;
                right: 20px;
            }

            .music-btn {
                width: 50px;
                height: 50px;
                font-size: 20px;
                bottom: 20px;
                left: 20px;
            }

            .modal-close {
                font-size: 35px;
                top: 15px;
                right: 25px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 12px;
                padding: 8px;
            }

            .photo-card img {
                height: 180px;
            }

            .photo-card-overlay-text {
                font-size: 1.2rem;
            }

            .floating-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
                bottom: 15px;
                right: 15px;
            }

            .music-btn {
                width: 45px;
                height: 45px;
                font-size: 18px;
                bottom: 15px;
                left: 15px;
            }
        }

        /* 超大屏幕优化 */
        @media (min-width: 1920px) {
            .gallery {
                max-width: 1800px;
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 35px;
            }

            .photo-card img {
                height: 280px;
            }
        }

        /* 悬浮按钮 */
        .floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        .floating-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        /* 音乐控制按钮 */
        .music-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .music-btn.playing {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);
            }
            50% {
                box-shadow: 0 0 0 15px rgba(231, 76, 60, 0);
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="gallery" id="gallery">
        <!-- 照片将通过JavaScript动态添加 -->
    </div>

    <!-- 模态框 -->
    <div id="modal" class="modal">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modal-img">
    </div>

    <!-- 音乐播放器 -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    
    <!-- 音乐控制按钮 -->
    <button class="music-btn" id="music-btn">🔇</button>
    
    <!-- 回到顶部按钮 -->
    <button class="floating-btn" onclick="scrollToTop()">↑</button>

    <script>
        // 粒子效果系统
        class ParticleSystem {
            constructor() {
                this.canvas = document.getElementById('particles-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.particles = [];
                this.mouse = { x: null, y: null };
                this.isDrawing = false;
                
                this.resize();
                this.bindEvents();
                this.animate();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            bindEvents() {
                // 鼠标事件
                window.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.x;
                    this.mouse.y = e.y;
                    this.createParticleTrail();
                });

                window.addEventListener('mousedown', () => {
                    this.isDrawing = true;
                });

                window.addEventListener('mouseup', () => {
                    this.isDrawing = false;
                });

                // 触摸事件
                window.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.mouse.x = touch.clientX;
                    this.mouse.y = touch.clientY;
                    this.createParticleTrail();
                });

                window.addEventListener('touchstart', (e) => {
                    const touch = e.touches[0];
                    this.mouse.x = touch.clientX;
                    this.mouse.y = touch.clientY;
                    this.isDrawing = true;
                    this.createParticleTrail();
                });

                window.addEventListener('touchend', () => {
                    this.isDrawing = false;
                });

                // 窗口大小变化
                window.addEventListener('resize', () => this.resize());
            }

            createParticleTrail() {
                for (let i = 0; i < 3; i++) {
                    this.particles.push(new Particle(this.mouse.x, this.mouse.y));
                }
            }

            animate() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const particle = this.particles[i];
                    particle.update();
                    particle.draw(this.ctx);

                    if (particle.life <= 0) {
                        this.particles.splice(i, 1);
                    }
                }

                requestAnimationFrame(() => this.animate());
            }
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 2;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.life = 1;
                this.decay = 0.0055; // 约3秒消散 (60fps)
                
                // 白色系颜色
                const colors = [
                    '#ffffff', '#f0f0f0', '#e0e0e0', '#d0d0d0',
                    '#c0c0c0', '#b0b0b0', '#a0a0a0', '#909090'
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                this.size *= 0.995; // 更慢的缩小速度
            }

            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // 初始化粒子系统
        const particles = new ParticleSystem();

        // 音乐播放器控制
        const bgMusic = document.getElementById('bg-music');
        const musicBtn = document.getElementById('music-btn');
        let isPlaying = false;

        // 尝试自动播放
        function tryAutoPlay() {
            const playPromise = bgMusic.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    musicBtn.textContent = '🔊';
                    musicBtn.classList.add('playing');
                }).catch((error) => {
                    // 自动播放被阻止，等待用户交互
                    console.log('自动播放被阻止，等待用户交互');
                    isPlaying = false;
                    musicBtn.textContent = '🔇';
                });
            }
        }

        // 音乐控制按钮点击事件
        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                bgMusic.pause();
                isPlaying = false;
                musicBtn.textContent = '🔇';
                musicBtn.classList.remove('playing');
            } else {
                bgMusic.play();
                isPlaying = true;
                musicBtn.textContent = '🔊';
                musicBtn.classList.add('playing');
            }
        });

        // 首次交互时尝试播放
        document.addEventListener('click', () => {
            if (!isPlaying) {
                tryAutoPlay();
            }
        }, { once: true });

        // 页面加载完成后尝试播放
        window.addEventListener('load', () => {
            tryAutoPlay();
        });

        const photoFiles = [
            '1.jpg', '2.jpg', '3.jpg', '4.jpg', '5.jpg', '6.jpg', '7.jpg', '8.jpg', '9.jpg', '10.jpg',
            '11.jpg', '12.jpg', '70.jpg', '71.jpg', '72.jpg', '73.jpeg', '74.jpg', '75.jpg', '81.jpg', '82.jpg',
            '83.jpg', '84.jpg', '91.jpg', '92.jpg', '93.jpg', '94.jpg', '95.jpg', '96.jpg', '97.jpg', '98.jpg',
            '99.jpg', '100.jpg', '101.jpg', '102.jpg', '103.jpg', '104.jpg', '105.jpg', '106.jpg', '107.jpg', '108.jpg'
        ];
        const gallery = document.getElementById('gallery');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modal-img');
        const modalClose = document.querySelector('.modal-close');

        // 动态添加照片
        function createGallery() {
            photoFiles.forEach((file, index) => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                
                card.innerHTML = `
                    <img src="photoxiao/${file}" alt="照片${index + 1}" loading="lazy">
                    <div class="photo-card-overlay">
                        <span class="photo-card-overlay-text">查看大图</span>
                    </div>
                `;

                // 点击照片打开模态框
                card.addEventListener('click', () => {
                    modal.style.display = 'flex';
                    modal.style.alignItems = 'center';
                    modal.style.justifyContent = 'center';
                    // 处理jpeg扩展名
                    const hdFile = file.replace('.jpeg', '.jpg');
                    modalImg.src = `photodage/${hdFile}`;
                });

                gallery.appendChild(card);
            });
        }

        // 关闭模态框
        modalClose.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // 回到顶部
        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        // 键盘操作支持
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') {
                modal.style.display = 'none';
            }
        });

        // 初始化画廊
        createGallery();
    </script>
</body>
</html>
